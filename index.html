<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HalloSapa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>HalloSapa</h1>

    <div class="button-container">
      <button id="callBtn" aria-label="Panggilan Suara">
        <img src="assets/telepon.png" class="btn-icon" alt="Telepon">
        <span class="btn-label">Panggilan Suara</span>
      </button>
      <button id="vcBtn" aria-label="Panggilan Video">
        <img src="assets/video.png" class="btn-icon" alt="Video">
        <span class="btn-label">Panggilan Video</span>
      </button>
    </div>

    <div class="status" id="status">Silakan pilih kontak terlebih dahulu</div>

    <section class="contacts">
      <div class="contacts-header">
        <h2>Daftar Kontak Anda</h2>
        <button id="addContactBtn">+Tambah Kontak</button>
      </div>
      <ul id="contactList">
        <li class="contact-item">
          <img src="assets/pp.png" class="avatar" alt="Foto Bu Sutriyah">
          <div class="contact-info">
            <span class="contact-name">Bu Sutriyah</span>
            <span class="contact-phone">081300000001</span>
          </div>
        </li>
        <li class="contact-item">
          <img src="assets/pp.png" class="avatar" alt="Foto Pak Hamidun">
          <div class="contact-info">
            <span class="contact-name">Pak Hamidun</span>
            <span class="contact-phone">081300000002</span>
          </div>
        </li>
      </ul>
    </section>
  </main>

  <div id="modalOverlay" class="modal-overlay" style="display: none;">
    <div class="modal">
      <h2>Kontak Baru</h2>
      <input type="text" id="contactNameInput" placeholder="Nama lengkap" />
      <input type="tel" id="contactPhoneInput" placeholder="Nomor telepon" />
      <div class="modal-actions">
        <button id="cancelModal">Batal</button>
        <button id="confirmModal">Simpan</button>
      </div>
    </div>
  </div>

  <audio id="ringtone" src="assets/EFEK SUARA MEMANGGIL TELEPON _ CALLING SOUND EFFECT.mp3" preload="auto"></audio>
  <script src="script.js"></script>
</body>
</html>
